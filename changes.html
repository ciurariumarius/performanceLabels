CHANGELOG
=========

2026-05-25
----------
- GomagData.gs: Added a new Gomag store data fetcher using the same resumable worker pattern as WooCommerce and Shopify. It reads products and orders from the Gomag Public API, writes a `Gomag` source sheet, updates Overview, and triggers label recalculation after sync.
- MenuSetup.gs / Settings.html / TriggerSetup.gs: Added `gomag` as a selectable platform with ApiShop, Apikey, product ID mode, manual run, credential view, and daily auto-fetch setup.
- Settings.html / MenuSetup.gs / TriggerSetup.gs: Added GA4 as its own selectable settings platform so the GA4 Property ID is only shown while configuring GA4.
- GomagData.gs / Settings.html: Gomag now imports all orders in the selected timeframe and no longer requires Order Status IDs.
- CommonUtilities.gs / MenuSetup.gs / Settings.html: Removed WooCommerce as the implicit default platform; users must select a platform explicitly before running or viewing credentials.
- MenuSetup.gs / SetupGuide.html: Added a guided setup checklist and reorganized the Sheets menu around Setup Guide, Run Now, Status & Logs, Google Ads Script, and Advanced tools.
- WooCommerceData.gs / ShopifyData.gs / GomagData.gs: Added one-shot Platform Data Only support so advanced store syncs can skip the automatic label recalculation.
- Google Ads copy script: Namespaced Google Ads-only Overview helpers so Sheets-side Gomag/Woo/Shopify runs cannot accidentally call `AdsApp`.
- GoogleAdsData.html / AdsScriptContent.gs: Moved the Google Ads copy-paste script out of `.gs` runtime code so it cannot define functions or reference `AdsApp` inside the Sheets project.
- GomagData.gs: Fixed Gomag product parsing for object-shaped API responses and `variations`, and added fetch counts to Overview status messages.
- GomagData.gs: Added `Gomag_Debug` diagnostics and a hard stop when the first product page returns no extractable products.
- CommonUtilities.gs: Added Gomag defaults for product ID mode.
- runAllLabelCalculations.gs: Added `Gomag` as a source sheet for Metrics consolidation and skips source rows without a resolved product ID.
- GoogleAnalyticsData.gs: Fixed GA4 Overview logging by passing the report timeframe into the sheet writer instead of referencing an out-of-scope variable.
- WooCommerceData.gs: Hardened product and order fetching so non-200 API responses fail/pause the worker instead of being mistaken for the end of pagination.
- ShopifyData.gs: Limited Shopify order revenue import to paid orders and subtracts line-item discounts when calculating revenue.
- getWooCommerceCustomers.gs / CommonUtilities.gs: Restored support for reading two-column Config sheets while still preferring Script Properties credentials.
- Label export: Blank label output mappings now truly disable the output column instead of creating blank-header columns.

2026-03-31
----------
- WooCommerceData.gs: Fixed a ReferenceError in processBatchCore_ where `props` was used instead of `scriptProperties`. This allows the script to correctly pause and save its batch state when approaching the execution time limit without crashing.
- Config.gs: Centralized configuration logic into a single codebase file, deprecating the obsolete "Config" spreadsheet tab for user configurations.
- Security Hardening: Removed plain-text API keys from fetcher files. Implemented a secure UI prompt via MenuSetup.gs that saves API credentials and store domains securely into the user's Script Properties.
- Label Mappings: Refactored the FEED_EXPORT_MAPPING object in Config.gs. Disabling a metric by assigning an empty string `""` now seamlessly skips column creation and calculation via upstream logic in CommonUtilities.gs.
- CommonUtilities.gs: Updated loadConfigurationsFromSheetObject to serve thresholds directly from the new Config.gs objects, removing legacy references to API keys.
- Code Cleanup: Deleted dead UI listener script `selectSourceConfig.gs` that navigated the deprecated Excel Config UI.
- Dual Feed Export: Renamed "Labels Feed" sheet to "GMC_Feed" across all 10 script files.
- Config.gs: Added `ID_PREFIX` and `ID_SUFFIX` settings. When set, a second feed "GMC_Feed_2" is automatically generated with modified IDs (e.g. "wc_post_id_12345" for Facebook/Meta matching).
