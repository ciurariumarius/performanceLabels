<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Google Sans', Arial, sans-serif; color: #202124; background: #fff; padding: 20px; font-size: 13px; }
    .header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 18px; }
    h2 { font-size: 18px; font-weight: 600; color: #1a73e8; margin-bottom: 4px; }
    .summary { color: #5f6368; line-height: 1.4; }
    .platform { font-weight: 600; color: #202124; }
    .actions-top { display: flex; gap: 8px; }
    .steps { display: flex; flex-direction: column; gap: 10px; }
    .step { border: 1px solid #dadce0; border-radius: 8px; padding: 14px; background: #fff; display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; }
    .step-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .step-detail { color: #5f6368; line-height: 1.35; }
    .badge { display: inline-block; border-radius: 999px; padding: 3px 9px; font-size: 11px; font-weight: 600; margin-bottom: 6px; }
    .done { background: #e6f4ea; color: #137333; }
    .missing { background: #fce8e6; color: #a50e0e; }
    .optional { background: #e8f0fe; color: #174ea6; }
    button { border: 1px solid #dadce0; background: #fff; color: #1a73e8; border-radius: 4px; padding: 8px 12px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; }
    button.primary { background: #1a73e8; color: #fff; border-color: #1a73e8; }
    button:hover { background: #f1f3f4; }
    button.primary:hover { background: #1765cc; }
    button:disabled { opacity: .65; cursor: wait; }
    .spinner {
      display: inline-block; width: 12px; height: 12px; margin-right: 7px;
      border: 2px solid rgba(26,115,232,.25); border-top-color: #1a73e8;
      border-radius: 50%; vertical-align: -2px; animation: spin .8s linear infinite;
    }
    button.primary .spinner { border-color: rgba(255,255,255,.55); border-top-color: #fff; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error { color: #c5221f; margin-top: 12px; display: none; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h2>Setup Guide</h2>
      <div class="summary">Active platform: <span id="platform" class="platform">Loading...</span></div>
    </div>
    <div class="actions-top">
      <button onclick="refresh(this)">Check Status</button>
    </div>
  </div>

  <div id="steps" class="steps"></div>
  <div id="error"></div>

  <script>
    function badgeClass(state) {
      if (state === 'Done' || state === 'Scheduled') return 'done';
      if (state === 'Missing' || state === 'Needs cleanup' || state === 'Not scheduled') return 'missing';
      return 'optional';
    }

    function badgeText(state) {
      return state === 'Missing' ? 'Needs setup' : state;
    }

    function renderStep(title, status, actionLabel, actionName) {
      var badge = status.state === 'Optional' || status.state === 'Manual worker only'
        ? ''
        : '<span class="badge ' + badgeClass(status.state) + '">' + badgeText(status.state) + '</span>';

      return [
        '<div class="step">',
        '<div>',
        badge,
        '<div class="step-title">' + title + '</div>',
        '<div class="step-detail">' + status.detail + '</div>',
        '</div>',
        '<button onclick="' + actionName + '(this)">' + actionLabel + '</button>',
        '</div>'
      ].join('');
    }

    function render(data) {
      document.getElementById('platform').textContent = data.platformLabel;
      document.getElementById('steps').innerHTML = [
        renderStep('1. Platform & Store Setup', data.credentials, 'Configure Store', 'openSettings'),
        renderStep('2. Label Mapping & Thresholds', data.labels, 'Configure Labels', 'openLabelSettings'),
        renderStep('3. Google Ads Script', data.adsScript, 'Copy Ads Script', 'openAdsScript'),
        renderStep('4. Auto-Fetch Schedule', data.autoFetch, 'Schedule Auto-Fetch', 'setupSchedule')
      ].join('');
    }

    function refresh(button) {
      document.getElementById('error').style.display = 'none';
      setButtonWorking(button, true, 'Checking...');
      google.script.run
        .withSuccessHandler(function(data) {
          setButtonWorking(button, false);
          render(data);
        })
        .withFailureHandler(function(error) {
          setButtonWorking(button, false);
          showError(error);
        })
        .getSetupStatus();
    }

    function showError(error) {
      var el = document.getElementById('error');
      el.textContent = error.message || String(error);
      el.style.display = 'block';
    }

    function openSettings(button) {
      openModalWithFeedback(button, 'Opening...', 'showSettingsDialog');
    }

    function openLabelSettings(button) {
      openModalWithFeedback(button, 'Opening...', 'showLabelSettingsDialog');
    }

    function openAdsScript(button) {
      openModalWithFeedback(button, 'Opening...', 'showAdsScriptModal');
    }

    function setupSchedule(button) {
      setButtonWorking(button, true, 'Scheduling...');
      google.script.run
        .withSuccessHandler(function() {
          setButtonWorking(button, false);
          refresh();
        })
        .withFailureHandler(function(error) {
          setButtonWorking(button, false);
          showError(error);
        })
        .setupActivePlatformAutoFetch();
    }

    function openModalWithFeedback(button, label, serverFunctionName) {
      setButtonWorking(button, true, label);
      var runner = google.script.run
        .withSuccessHandler(function() {
          google.script.host.close();
        })
        .withFailureHandler(function(error) {
          setButtonWorking(button, false);
          showError(error);
        });

      if (serverFunctionName === 'showSettingsDialog') {
        runner.showSettingsDialog();
      } else if (serverFunctionName === 'showLabelSettingsDialog') {
        runner.showLabelSettingsDialog();
      } else {
        runner.showAdsScriptModal();
      }
    }

    function setButtonWorking(button, isWorking, label) {
      if (!button) return;
      if (isWorking) {
        button.dataset.originalText = button.dataset.originalText || button.textContent;
        button.disabled = true;
        button.innerHTML = '<span class="spinner"></span>' + (label || 'Working...');
      } else {
        button.disabled = false;
        button.textContent = button.dataset.originalText || button.textContent;
      }
    }

    refresh();
  </script>
</body>
</html>
