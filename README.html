<!-- 
PERFORMANCE LABELS DOCUMENTATION
================================

Automated Product Segmentation System v3.0
------------------------------------------
This tool automatically labels your products for Google Merchant Center.

*** START HERE ***
To see the "Performance Labels" menu:
1. Refresh this Spreadsheet page.
2. Wait a few seconds for the menu to appear in the top bar.
3. Use the menu to "Show Documentation" or run tools.
******************


1. CONFIGURATION
----------------
All business rules and label mappings are controlled directly in the 'Config.gs' script file. Features include:
- Changing thresholds (e.g., ROAS_GOOD, HIGH_REVENUE_THRESHOLD).
- Mapping internal metrics to Custom Labels for Merchant Center export (e.g. "custom_label_0").
- Disabling specific labels by setting their mapping to an empty string ("").

2. SECURE API SETTINGS
----------------------
API Keys and Webstore Domains are NO LONGER stored in code.
To set up your stores:
1. Use the menu: "Performance Labels" -> "🔧 Setup & Fetch".
2. Click "🔑 Set Store Settings (Secure)".
3. Enter your platform (WooCommerce/Shopify), Domain, and API credentials.
These are securely saved to your Google Account's Script Properties.


3. GOOGLE ADS SETUP
-------------------
To get ROAS and Clicks data:
1. Open 'GoogleAdsData.gs' in this editor.
2. Copy the entire code.
3. Go to Google Ads > Tools > Scripts.
4. Paste the code and set the 'SPREADSHEET_URL' variable.
5. Schedule it Daily (e.g., 4:00 AM).


4. AUTOMATION SETUP
-------------------
To enable the daily schedule:
1. Open 'TriggerSetup.gs' in this editor.
2. Run 'setupShopifyComplete' (or 'setupWooCommerceComplete').
* This schedules fetching for 5:00 AM daily.


5. MANUAL USAGE
---------------
Use the "Performance Labels" menu in the spreadsheet toolbar to:
- Fetch Data: Pull fresh data immediately.
- Update All Labels: Re-calculate labels on existing data.


6. PUBLISHING THE FEED URL (FOR GOOGLE MERCHANT CENTER)
-------------------------------------------------------
The calculated labels are written to the "GMC_Feed" tab in this Spreadsheet.
To generate a live CSV feed link:

1. In your Google Spreadsheet, click File > Share > Publish to web.
2. Change "Entire Document" to "GMC_Feed".
3. Change "Web page" to "Comma-separated values (.csv)".
4. Click Publish and copy the generated URL.

For Facebook/Meta Ads, use the "GMC_Feed_2" tab instead.
Its IDs are automatically prefixed/suffixed based on ID_PREFIX and ID_SUFFIX settings in Config.gs.
Example: set ID_PREFIX = "wc_post_id_" to produce IDs like "wc_post_id_12345".
-->
