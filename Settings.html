<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Google Sans', Arial, sans-serif; font-size: 13px; color: #202124; background: #fff; padding: 16px; }
    h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #1a73e8; }
    .section { margin-bottom: 16px; }
    label { display: block; font-weight: 500; margin-bottom: 4px; color: #3c4043; }
    .hint { font-size: 11px; color: #80868b; margin-bottom: 6px; }
    input[type="text"], input[type="password"], select {
      width: 100%; padding: 7px 10px; border: 1px solid #dadce0;
      border-radius: 4px; font-size: 13px; color: #202124;
      transition: border-color .15s;
    }
    input:focus, select:focus { outline: none; border-color: #1a73e8; }
    .platform-toggle { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .platform-btn {
      flex: 1 1 calc(50% - 8px); padding: 8px; border: 2px solid #dadce0; border-radius: 6px;
      background: #fff; cursor: pointer; font-size: 13px; font-weight: 500;
      text-align: center; transition: all .15s;
    }
    .platform-btn.active { border-color: #1a73e8; background: #e8f0fe; color: #1a73e8; }
    .platform-section { display: none; }
    .platform-section.visible { display: block; }
    .divider { border: none; border-top: 1px solid #e8eaed; margin: 14px 0; }
    .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
    .btn {
      padding: 8px 18px; border-radius: 4px; font-size: 13px;
      font-weight: 500; cursor: pointer; border: none;
    }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-primary:hover { background: #1765cc; }
    .btn-secondary { background: #fff; color: #1a73e8; border: 1px solid #dadce0; }
    .btn-secondary:hover { background: #f1f3f4; }
    #status { margin-top: 10px; font-size: 12px; color: #188038; display: none; }
    #error  { margin-top: 10px; font-size: 12px; color: #c5221f; display: none; }
  </style>
</head>
<body>
  <h2>⚙️ Platform & API Settings</h2>

  <!-- Platform Selector -->
  <div class="section">
    <label>Platform</label>
    <div class="platform-toggle">
      <div class="platform-btn" id="btn-woo" onclick="setPlatform('woocommerce')">🛒 WooCommerce</div>
      <div class="platform-btn" id="btn-shopify" onclick="setPlatform('shopify')">🛍️ Shopify</div>
      <div class="platform-btn" id="btn-gomag" onclick="setPlatform('gomag')">Gomag</div>
      <div class="platform-btn" id="btn-ga4" onclick="setPlatform('ga4')">GA4</div>
    </div>
  </div>

  <hr class="divider">

  <!-- Google Analytics Fields -->
  <div id="section-ga4" class="platform-section">
    <label>GA4 Property ID</label>
    <div class="hint">e.g., 123456789</div>
    <input type="text" id="ga4-property-id" placeholder="Enter Property ID">
  </div>

  <hr class="divider">

  <!-- WooCommerce Fields -->
  <div id="section-woocommerce" class="platform-section">
    <div class="section">
      <label>WooCommerce Domain</label>
      <div class="hint">e.g., myshop.com (no https://)</div>
      <input type="text" id="woo-domain" placeholder="myshop.com">
    </div>
    <div class="section">
      <label>API Key (ck_...)</label>
      <input type="password" id="woo-key" placeholder="Leave blank to keep existing">
    </div>
    <div class="section">
      <label>API Secret (cs_...)</label>
      <input type="password" id="woo-secret" placeholder="Leave blank to keep existing">
    </div>
  </div>

  <!-- Shopify Fields -->
  <div id="section-shopify" class="platform-section">
    <div class="section">
      <label>Shopify Domain</label>
      <div class="hint">e.g., mystore.myshopify.com</div>
      <input type="text" id="shopify-domain" placeholder="mystore.myshopify.com">
    </div>
    <div class="section">
      <label>Client ID / API Key</label>
      <input type="password" id="shopify-id" placeholder="Leave blank to keep existing">
    </div>
    <div class="section">
      <label>Client Secret</label>
      <input type="password" id="shopify-secret" placeholder="Leave blank to keep existing">
    </div>
  </div>

  <!-- Gomag Fields -->
  <div id="section-gomag" class="platform-section">
    <div class="section">
      <label>ApiShop</label>
      <div class="hint">e.g., https://shop.ro or Api_shop_pagina</div>
      <input type="text" id="gomag-api-shop" placeholder="https://shop.ro">
    </div>
    <div class="section">
      <label>Apikey</label>
      <input type="password" id="gomag-api-key" placeholder="Leave blank to keep existing">
    </div>
    <div class="section">
      <label>Product ID Mode</label>
      <select id="gomag-id-mode">
        <option value="sku">SKU</option>
        <option value="product_id">Product ID</option>
        <option value="ean">EAN</option>
      </select>
    </div>
  </div>

  <div id="status">✅ Settings saved!</div>
  <div id="error"></div>

  <div class="actions">
    <button class="btn btn-secondary" onclick="google.script.host.close()">Cancel</button>
    <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
  </div>

  <script>
    var currentPlatform = '';

    // On load: get current settings from server
    google.script.run
      .withSuccessHandler(function(data) {
        setPlatform(data.platform || '');
        document.getElementById('woo-domain').value     = data.wooDomain     || '';
        document.getElementById('woo-key').value        = data.wooKey        || '';
        document.getElementById('woo-secret').value     = data.wooSecret     || '';
        document.getElementById('shopify-domain').value = data.shopifyDomain || '';
        document.getElementById('shopify-id').value     = data.shopifyId     || '';
        document.getElementById('shopify-secret').value = data.shopifySecret || '';
        document.getElementById('gomag-api-shop').value = data.gomagApiShop || '';
        document.getElementById('gomag-api-key').value  = data.gomagApiKey  || '';
        document.getElementById('gomag-id-mode').value  = data.gomagIdMode  || 'sku';
        document.getElementById('ga4-property-id').value = data.ga4PropertyId || '';
      })
      .getCurrentSettingsForDialog();

    // Clear masked value on focus so user can type a new one
    ['woo-key','woo-secret','shopify-id','shopify-secret','gomag-api-key'].forEach(function(id) {
      var el = document.getElementById(id);
      el.addEventListener('focus', function() {
        if (this.value.startsWith('\u2022')) this.value = '';
      });
    });

    function setPlatform(p) {
      currentPlatform = p;
      document.getElementById('btn-woo').classList.toggle('active', p === 'woocommerce');
      document.getElementById('btn-shopify').classList.toggle('active', p === 'shopify');
      document.getElementById('btn-gomag').classList.toggle('active', p === 'gomag');
      document.getElementById('btn-ga4').classList.toggle('active', p === 'ga4');
      document.getElementById('section-woocommerce').classList.toggle('visible', p === 'woocommerce');
      document.getElementById('section-shopify').classList.toggle('visible', p === 'shopify');
      document.getElementById('section-gomag').classList.toggle('visible', p === 'gomag');
      document.getElementById('section-ga4').classList.toggle('visible', p === 'ga4');
    }

    function saveSettings() {
      // Skip masked values that the user didn't change
      function changed(id) {
        var v = document.getElementById(id).value.trim();
        return v && !v.startsWith('\u2022') ? v : '';
      }

      if (!currentPlatform) {
        document.getElementById('status').style.display = 'none';
        document.getElementById('error').textContent = 'Please select a platform first.';
        document.getElementById('error').style.display = 'block';
        return;
      }

      var payload = {
        platform:      currentPlatform,
        wooDomain:     document.getElementById('woo-domain').value.trim(),
        wooKey:        changed('woo-key'),
        wooSecret:     changed('woo-secret'),
        shopifyDomain: document.getElementById('shopify-domain').value.trim(),
        shopifyId:     changed('shopify-id'),
        shopifySecret: changed('shopify-secret'),
        gomagApiShop:  document.getElementById('gomag-api-shop').value.trim(),
        gomagApiKey:   changed('gomag-api-key'),
        gomagIdMode:   document.getElementById('gomag-id-mode').value,
        ga4PropertyId: document.getElementById('ga4-property-id').value.trim()
      };

      document.getElementById('status').style.display = 'none';
      document.getElementById('error').style.display  = 'none';

      google.script.run
        .withSuccessHandler(function() {
          document.getElementById('status').style.display = 'block';
          // Rebuild menu to reflect platform change, then close
          google.script.run.onOpen();
          setTimeout(function() { google.script.host.close(); }, 1000);
        })
        .withFailureHandler(function(err) {
          document.getElementById('error').textContent = '❌ ' + err.message;
          document.getElementById('error').style.display = 'block';
        })
        .saveSettingsFromDialog(payload);
    }
  </script>
</body>
</html>
